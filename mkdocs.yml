site_name: markdown-vault-mcp
site_url: https://pvliesdonk.github.io/markdown-vault-mcp/
site_description: Generic markdown collection MCP server with FTS5 + semantic search
repo_url: https://github.com/pvliesdonk/markdown-vault-mcp
repo_name: pvliesdonk/markdown-vault-mcp
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_bases: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Configuration: configuration.md
  - MCP Interface:
      - Tools: tools/index.md
      - Resources: resources.md
      - Prompts: prompts.md
  - Deployment:
      - Overview: deployment/index.md
      - Docker: deployment/docker.md
      - Claude Desktop: deployment/claude-desktop.md
      - OIDC Authentication: deployment/oidc.md
  - Python API:
      - Collection: api/collection.md
      - Git Integration: api/git.md
      - Configuration: api/config.md
      - Embedding Providers: api/providers.md
  - Reference:
      - Design Spec: design.md
